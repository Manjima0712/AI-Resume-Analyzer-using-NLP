name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest gunicorn flask werkzeug nltk spacy scikit-learn numpy pandas pymupdf python-docx python-dotenv
        python -m nltk.downloader punkt stopwords words averaged_perceptron_tagger
        python -m spacy download en_core_web_sm
        
    - name: Test with pytest
      run: |
        pytest
